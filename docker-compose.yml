services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecg-afib-backend
    restart: unless-stopped
    env_file:
      - .env.aws
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    command: ["uvicorn", "backend.app:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ecg-afib-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
